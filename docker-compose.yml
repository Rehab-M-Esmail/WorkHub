# Loads variables from project-root .env (see .env.example).
services:
  postgres:
    image: postgres:16
    container_name: workhub-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workhub}
      POSTGRES_USER: ${POSTGRES_USER:-workhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workhub}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workhub} -d ${POSTGRES_DB:-workhub}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.7
    container_name: workhub-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - redpanda:8082
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
      - "${REDPANDA_ADMIN_HOST_PORT:-9644}:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 20

  workhub-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workhub-app
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
      DB_HOST: ${DB_HOST:-postgres}
      DB_USERNAME: ${DB_USERNAME:-workhub}
      DB_PASSWORD: ${DB_PASSWORD:-workhub}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/workhub}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-workhub}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-workhub}
      AUTH_SECRETKEY: ${AUTH_SECRETKEY:-WorkHubWorkinghubbbbhfdhfgueusfuherfqwoeierf345vg43tv44vt5463}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      WORKHUB_KAFKA_TOPICS_REPORT_REQUESTED: ${WORKHUB_KAFKA_TOPICS_REPORT_REQUESTED:-workhub.report.requested.v1}
      WORKHUB_REPORT_PROCESSING_DELAY_MS: ${WORKHUB_REPORT_PROCESSING_DELAY_MS:-1500}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:-1.0}
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: ${MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT:-http://tempo:4318/v1/traces}
    ports:
      - "${APP_HOST_PORT:-8080}:8080"

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./src/cfg/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "${PROMETHEUS_HOST_PORT:-9091}:9090"

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: ${GF_USERS_ALLOW_SIGN_UP:-false}
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    volumes:
      - ./src/cfg/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./src/cfg/grafana/grafana.ini:/etc/grafana/grafana.ini
